dataset_version_label: v3
model:
  family: yolo11
  size: n
train:
  epochs: 100
  imgsz: 640
  batch: 16
  device: "0"
  workers: 8
  project: artifacts/runs
  name: yolo11n-sample
  cache: disk
  amp: true
  optimizer: auto
export:
  include_best_pt: true
  formats:
